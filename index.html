<meta name="generator" content="Perplexity Computer">

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jet Horizon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zain:wght@300;400;700&family=Silkscreen&family=Audiowide&family=Aldrich&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

<!-- ── TITLE SCREEN ─────────────────────────────── -->
<div id="title-screen" class="overlay">
  <div class="title-content">
    <h1 class="game-title">JET<br>HORIZON</h1>
    <button id="start-btn" class="btn-space">SPACE</button>
    <!-- hidden slider kept for JS compatibility -->
    <span id="title-coin-count" style="display:none">0</span>
  </div>
</div>

<!-- ── GAME OVER SCREEN ──────────────────────────── -->
<div id="gameover-screen" class="overlay hidden">
  <div class="gameover-content">
    <h2 class="gameover-title">GAME OVER</h2>
    <div class="score-display">
      <div class="score-row"><span class="score-label">SCORE</span><span id="go-score" class="score-val">0</span></div>
      <div class="score-row"><span class="score-label">BEST</span><span id="go-best" class="score-val">0</span></div>
      <div class="score-row"><span class="score-label">LEVEL</span><span id="go-level" class="score-val">1</span></div>
    </div>
    <button id="restart-btn" class="btn-space">AGAIN</button>
  </div>
</div>

<!-- ── LEVEL BANNER ──────────────────────────────── -->
<div id="level-banner" class="level-banner hidden">
  <span id="level-banner-text">LEVEL 2 — ULTRAVIOLET</span>
</div>

<!-- ── HUD ──────────────────────────────────────── -->
<div id="hud" class="hud hidden">
  <div class="hud-left">
    <div class="hud-label">SCORE</div>
    <div id="hud-score" class="hud-value">0</div>
    <div id="hud-multiplier" class="hud-mult hidden">✕2</div>
  </div>
  <div class="hud-center">
    <div class="hud-label">LEVEL</div>
    <div id="hud-level" class="hud-value">1</div>
  </div>
  <div class="hud-right">
    <div class="hud-label">SPEED</div>
    <div id="hud-speed" class="hud-value">1.0x</div>
  </div>
  <div class="hud-coins-wrap">
    <span class="hud-coin-icon">⬡</span><span id="hud-coins" class="hud-coin-val">0</span><span class="hud-coin-label">COINS</span>
  </div>
  <!-- Active power-up tray -->
  <div id="powerup-tray" class="powerup-tray"></div>
  <!-- Mute button -->
  <button id="mute-btn" class="mute-btn" aria-label="Toggle mute">♪</button>

</div>

<!-- ── PAUSE OVERLAY ─────────────────────────────── -->
<div id="pause-overlay" class="pause-overlay hidden">
  <div class="pause-content">
    <div class="pause-title">PAUSED</div>
    <div class="pause-actions">
      <button class="btn-space" onclick="playResumeSound(); togglePause()">RETURN</button>
      <button class="btn-space" onclick="playExitSound(); returnToTitle()">EXIT</button>
    </div>
  </div>
</div>

<!-- ── DEBUG OVERLAY ─────────────────────────────── -->
<div id="debug-overlay" class="debug-overlay"></div>

<!-- L1 cinematic intro overlay -->
<div id="intro-overlay" style="display:none;"></div>

<audio id="bgm" src="./spacewalk.mp3" loop preload="auto"></audio>
<audio id="start-sound" src="./start.mp3" preload="auto"></audio>
<audio id="crash-sound" src="./crash.mp3" preload="auto"></audio>
<audio id="exit-sound" src="./exit.mp3" preload="auto"></audio>
<audio id="whoosh-sound" src="./whoosh.mp3" preload="auto"></audio>
<audio id="title-music" src="./title.mp3" loop preload="auto"></audio>
<audio id="l3-music" src="./l3music.mp3" loop preload="auto"></audio>
<audio id="l4-music" src="./l4music.mp3" loop preload="auto"></audio>
<canvas id="game-canvas"></canvas>

<!-- ── TOUCH CONTROLS ──────────────────────── -->
<div id="touch-controls" class="touch-controls hidden">
  <!-- Left zone: steer left -->
  <div class="touch-left" id="touch-left"></div>
  <!-- Right zone: steer right -->
  <div class="touch-right" id="touch-right"></div>
  <!-- Roll buttons: bottom center -->
  <div class="touch-roll-wrap">
    <div class="touch-roll" id="touch-roll-up">↺</div>
    <div class="touch-roll" id="touch-roll-down">↻</div>
  </div>
  <!-- Pause button -->
  <div class="touch-pause" id="touch-pause">⏸</div>
</div>

<footer style="display:none">
  <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener noreferrer">Created with Perplexity Computer</a>
</footer>

<script type="module" src="./game.js"></script>
</body>
</html>
